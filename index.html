    <script>
        (function() {
            const typeBtns = document.querySelectorAll('.type-btn');
            const whole1Block = document.getElementById('whole1Block');
            const whole2Block = document.getElementById('whole2Block');
            const whole1Input = document.getElementById('whole1');
            const whole2Input = document.getElementById('whole2');
            const opBtns = document.querySelectorAll('.op-btn');
            const opSignDisplay = document.getElementById('opSignDisplay');
            const num1Input = document.getElementById('num1');
            const den1Input = document.getElementById('den1');
            const num2Input = document.getElementById('num2');
            const den2Input = document.getElementById('den2');
            const solveBtn = document.getElementById('solveBtn');
            const solutionArea = document.getElementById('solutionArea');
            const resultBig = document.getElementById('resultBig');
            const stepsContainer = document.getElementById('stepsContainer');
            const errorMsg = document.getElementById('errorMsg');

            let currentOp = 'add';
            let currentType = 'simple';

            const opSymbols = {
                add: '+',
                subtract: '−',
                multiply: '×',
                divide: '÷'
            };
            const opNames = {
                add: 'сложения',
                subtract: 'вычитания',
                multiply: 'умножения',
                divide: 'деления'
            };

            typeBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    typeBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentType = this.dataset.type;
                    if (currentType === 'mixed') {
                        whole1Block.classList.add('visible');
                        whole2Block.classList.add('visible');
                    } else {
                        whole1Block.classList.remove('visible');
                        whole2Block.classList.remove('visible');
                    }
                    hideSolution();
                    hideError();
                });
            });

            opBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    opBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentOp = this.dataset.op;
                    opSignDisplay.textContent = opSymbols[currentOp];
                    hideSolution();
                    hideError();
                });
            });

            function gcd(a, b) {
                a = Math.abs(a);
                b = Math.abs(b);
                while (b > 0) {
                    [a, b] = [b, a % b];
                }
                return a || 1;
            }

            function lcm(a, b) {
                return (a * b) / gcd(a, b);
            }

            function formatFraction(num, den) {
                if (den === 0) return '<span style="color:#ff8a80;">∞</span>';
                const absNum = Math.abs(num);
                const absDen = Math.abs(den);
                const sign = (num < 0 && den > 0) || (num > 0 && den < 0) ? '−' : '';
                const n = absNum;
                const d = absDen;
                if (d === 1) return sign + n;
                return sign + '<span class="frac-inline"><span class="f-top">' + n +
                    '</span><span style="display:block;border-bottom:2px solid #aaa;height:2px;"></span><span>' + d +
                    '</span></span>';
            }

            function formatMixed(num, den) {
                if (den === 0) return '∞';
                const sign = (num < 0 && den > 0) || (num > 0 && den < 0) ? '−' : '';
                const absNum = Math.abs(num);
                const absDen = Math.abs(den);
                if (absDen === 1) return sign + absNum;
                const whole = Math.floor(absNum / absDen);
                const remainder = absNum % absDen;
                if (remainder === 0) return sign + whole;
                if (whole === 0) {
                    return sign + '<span class="frac-inline"><span class="f-top">' + remainder +
                        '</span><span style="display:block;border-bottom:2px solid #aaa;height:2px;"></span><span>' +
                        absDen + '</span></span>';
                }
                return sign + '<span class="mixed">' + whole + '</span> <span class="frac-inline"><span class="f-top">' +
                    remainder +
                    '</span><span style="display:block;border-bottom:2px solid #aaa;height:2px;"></span><span>' + absDen +
                    '</span></span>';
            }

            function normalizeFraction(num, den) {
                if (den === 0) return { num, den };
                if (den < 0) {
                    num = -num;
                    den = -den;
                }
                return { num, den };
            }

            function getImproperFraction(wholeInput, numInput, denInput, type) {
                let n = parseInt(numInput.value);
                let d = parseInt(denInput.value);
                let result = { num: n, den: d };

                if (type === 'mixed') {
                    let w = parseInt(wholeInput.value);
                    if (isNaN(w)) w = 0;
                    if (w < 0 && n < 0) n = -n;
                    if (w >= 0) {
                        result.num = w * d + n;
                    } else {
                        result.num = w * d - n;
                    }
                    result.den = d;
                }

                return normalizeFraction(result.num, result.den);
            }

            function solve() {
                hideError();
                hideSolution();

                const n1Raw = parseInt(num1Input.value);
                const d1Raw = parseInt(den1Input.value);
                const n2Raw = parseInt(num2Input.value);
                const d2Raw = parseInt(den2Input.value);

                if (isNaN(n1Raw) || isNaN(d1Raw) || isNaN(n2Raw) || isNaN(d2Raw)) {
                    showError('⚠️ Заполните все поля числителей и знаменателей.');
                    return;
                }
                if (d1Raw === 0 || d2Raw === 0) {
                    showError('⚠️ Знаменатель не может быть равен нулю.');
                    return;
                }
                if (currentType === 'mixed') {
                    if (isNaN(parseInt(whole1Input.value))) whole1Input.value = 0;
                    if (isNaN(parseInt(whole2Input.value))) whole2Input.value = 0;
                }

                const frac1 = getImproperFraction(whole1Input, num1Input, den1Input, currentType);
                const frac2 = getImproperFraction(whole2Input, num2Input, den2Input, currentType);

                if (currentOp === 'divide' && frac2.num === 0) {
                    showError('⚠️ Деление на ноль: вторая дробь равна нулю.');
                    return;
                }

                const steps = [];
                let resultNum, resultDen;

                steps.push({
                    text: '📌 <strong>Исходные числа:</strong> ' + formatFraction(frac1.num, frac1.den) + ' и ' +
                        formatFraction(frac2.num, frac2.den) + '. Операция: <strong>' + opNames[currentOp] +
                        '</strong> (' + opSymbols[currentOp] + ').'
                });

                if (currentOp === 'add') {
                    if (frac1.den === frac2.den) {
                        steps.push({
                            text: '✅ Знаменатели одинаковые (' + frac1.den + '), складываем числители: <span class="highlight-num">' +
                                frac1.num + ' + ' + frac2.num + ' = ' + (frac1.num + frac2.num) + '</span>.'
                        });
                        resultNum = frac1.num + frac2.num;
                        resultDen = frac1.den;
                    } else {
                        const commonDen = lcm(frac1.den, frac2.den);
                        const newN1 = frac1.num * (commonDen / frac1.den);
                        const newN2 = frac2.num * (commonDen / frac2.den);
                        steps.push({
                            text: '🔹 Находим НОК(' + frac1.den + ', ' + frac2.den + ') = <span class="highlight-num">' +
                                commonDen + '</span> (общий знаменатель).'
                        });
                        steps.push({
                            text: '🔹 Приводим дроби: ' + formatFraction(frac1.num, frac1.den) + ' = <span class="highlight-num">' +
                                newN1 + '</span>/' + commonDen + '; ' + formatFraction(frac2.num, frac2.den) +
                                ' = <span class="highlight-num">' + newN2 + '</span>/' + commonDen + '.'
                        });
                        steps.push({
                            text: '✅ Сумма: <span class="highlight-num">' + newN1 + ' + ' + newN2 + ' = ' + (newN1 +
                                newN2) + '</span> / ' + commonDen + '.'
                        });
                        resultNum = newN1 + newN2;
                        resultDen = commonDen;
                    }
                } else if (currentOp === 'subtract') {
                    if (frac1.den === frac2.den) {
                        steps.push({
                            text: '✅ Знаменатели одинаковые (' + frac1.den + '), вычитаем: <span class="highlight-num">' +
                                frac1.num + ' − ' + frac2.num + ' = ' + (frac1.num - frac2.num) + '</span>.'
                        });
                        resultNum = frac1.num - frac2.num;
                        resultDen = frac1.den;
                    } else {
                        const commonDen = lcm(frac1.den, frac2.den);
                        const newN1 = frac1.num * (commonDen / frac1.den);
                        const newN2 = frac2.num * (commonDen / frac2.den);
                        steps.push({
                            text: '🔹 Находим НОК(' + frac1.den + ', ' + frac2.den + ') = <span class="highlight-num">' +
                                commonDen + '</span> (общий знаменатель).'
                        });
                        steps.push({
                            text: '🔹 Приводим дроби: ' + formatFraction(frac1.num, frac1.den) + ' = <span class="highlight-num">' +
                                newN1 + '</span>/' + commonDen + '; ' + formatFraction(frac2.num, frac2.den) +
                                ' = <span class="highlight-num">' + newN2 + '</span>/' + commonDen + '.'
                        });
                        steps.push({
                            text: '✅ Разность: <span class="highlight-num">' + newN1 + ' − ' + newN2 + ' = ' + (newN1 -
                                newN2) + '</span> / ' + commonDen + '.'
                        });
                        resultNum = newN1 - newN2;
                        resultDen = commonDen;
                    }
                } else if (currentOp === 'multiply') {
                    resultNum = frac1.num * frac2.num;
                    resultDen = frac1.den * frac2.den;
                    steps.push({
                        text: '✅ Умножаем числители: <span class="highlight-num">' + frac1.num + ' × ' + frac2.num +
                            ' = ' + resultNum + '</span>.'
                    });
                    steps.push({
                        text: '✅ Умножаем знаменатели: <span class="highlight-num">' + frac1.den + ' × ' + frac2.den +
                            ' = ' + resultDen + '</span>.'
                    });
                } else if (currentOp === 'divide') {
                    const recNum = frac2.den;
                    const recDen = frac2.num;
                    steps.push({
                        text: '🔹 Переворачиваем вторую дробь: ' + formatFraction(frac2.num, frac2.den) + ' → ' +
                            formatFraction(recNum, recDen) + '.'
                    });
                    resultNum = frac1.num * recNum;
                    resultDen = frac1.den * recDen;
                    steps.push({
                        text: '✅ Умножаем: ' + formatFraction(frac1.num, frac1.den) + ' × ' + formatFraction(recNum,
                            recDen) + ' = <span class="highlight-num">' + resultNum + '</span> / ' + resultDen + '.'
                    });
                }

                const normalized = normalizeFraction(resultNum, resultDen);
                resultNum = normalized.num;
                resultDen = normalized.den;

                const commonGCD = gcd(resultNum, resultDen);
                let finalNum = resultNum;
                let finalDen = resultDen;
                if (commonGCD > 1) {
                    finalNum = resultNum / commonGCD;
                    finalDen = resultDen / commonGCD;
                    steps.push({
                        text: '🔸 Сокращение на НОД(' + resultNum + ', ' + resultDen + ') = <span class="highlight-num">' +
                            commonGCD + '</span>. Получаем ' + formatFraction(finalNum, finalDen) + '.'
                    });
                } else if (resultNum !== 0 && Math.abs(resultNum) > 0 && Math.abs(resultDen) > 0) {
                    steps.push({ text: '🔸 Дробь уже несократима (НОД = 1).' });
                }

                if (finalNum === 0) {
                    finalDen = 1;
                    steps.push({ text: '🎯 Результат: <strong>0</strong>.' });
                }

                resultBig.innerHTML = '🎯 <strong>Результат:</strong> ' + formatMixed(finalNum, finalDen) +
                    ' &nbsp;<small style="color:#9e9e9e;">(' + formatFraction(finalNum, finalDen) + ')</small>';

                stepsContainer.innerHTML = '';
                steps.forEach((step, index) => {
                    const div = document.createElement('div');
                    div.className = 'step';
                    div.innerHTML = '<span class="step-num">' + (index + 1) + '</span>' + step.text;
                    stepsContainer.appendChild(div);
                });

                showSolution();
            }

            function showSolution() {
                solutionArea.classList.add('visible');
                solutionArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            function hideSolution() {
                solutionArea.classList.remove('visible');
                resultBig.innerHTML = '';
                stepsContainer.innerHTML = '';
            }
            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.add('visible');
                errorMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            function hideError() {
                errorMsg.classList.remove('visible');
                errorMsg.textContent = '';
            }

            solveBtn.addEventListener('click', solve);
            [num1Input, den1Input, num2Input, den2Input, whole1Input, whole2Input].forEach(input => {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        solve();
                    }
                });
            });

            whole1Block.classList.remove('visible');
            whole2Block.classList.remove('visible');
        })();
    </script>
</body>
</html>
